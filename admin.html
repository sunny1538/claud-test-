<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel — Cloud Kitchen</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f8;color:#1a1a1a}
.topbar{background:#1a1a2e;padding:13px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{color:#fff;font-size:16px;font-weight:700;flex:1}
.live-badge{font-size:11px;background:#1D9E75;color:#fff;border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.layout{display:grid;grid-template-columns:1fr 400px;min-height:calc(100vh - 50px)}
.left{padding:18px;overflow-y:auto}
.right{background:#fff;border-left:1px solid #e8e8e8;padding:20px;overflow-y:auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:#fff;border-radius:10px;padding:13px 15px;border:1px solid #e8e8e8}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700}
.stat-val.g{color:#0F6E56}.stat-val.a{color:#854F0B}.stat-val.r{color:#E24B4A}.stat-val.b{color:#185FA5}
.orders-card{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden}
.card-head{padding:13px 18px;border-bottom:1px solid #e8e8e8;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;transition:all 0.15s}
.filter-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.order-row{padding:12px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.12s}
.order-row:last-child{border-bottom:none}
.order-row:hover{background:#f9f9fc}
.order-row.selected{background:#EEF2FF}
.order-row.new-ping{animation:newping 1.5s ease}
@keyframes newping{0%,100%{background:transparent}30%,70%{background:#FFF3E0}}
.oid{font-size:12px;font-weight:700;min-width:52px;color:#534AB7}
.oname{font-size:13px;font-weight:500;flex:1}
.oarea{font-size:11px;color:#888;flex:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.odist{font-size:11px;font-weight:600;min-width:58px;text-align:right}
.odist.ok{color:#0F6E56}.odist.warn{color:#E24B4A}.odist.na{color:#bbb}
.pill{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;font-weight:600}
.p-new{background:#E6F1FB;color:#0C447C}
.p-confirmed{background:#EEEDFE;color:#3C3489}
.p-out{background:#FAEEDA;color:#633806}
.p-delivered{background:#EAF3DE;color:#27500A}
.p-cancelled{background:#fdecea;color:#7f1d1d}
.detail-empty{padding:60px 20px;text-align:center;color:#aaa}
.detail-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:13px}
.field-key{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px}
.field-val{font-size:13px;line-height:1.4}
.field-val.mono{font-family:'SF Mono',monospace;font-size:12px}
.qr-box{background:#f8f8f8;border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;border:1px solid #eee}
.map-mini{background:#E8F5E9;border-radius:10px;height:120px;position:relative;overflow:hidden;margin-bottom:14px;border:1px solid #C8E6C9}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px}
.sbtn{padding:9px;border-radius:8px;border:1px solid #ddd;font-size:12px;font-weight:600;cursor:pointer;background:#fff;transition:all 0.12s;text-align:center}
.sbtn:hover{background:#f0f0f0}
.sbtn.primary{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.sbtn.primary:hover{background:#2d2d4e}
.sbtn.red{background:#fdecea;color:#7f1d1d;border-color:#fecaca}
.no-gps{font-size:12px;background:#FFF3E0;color:#854F0B;border-radius:8px;padding:8px 12px;margin-bottom:12px}
.has-gps{font-size:12px;background:#E1F5EE;color:#085041;border-radius:8px;padding:8px 12px;margin-bottom:12px}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.empty-orders{padding:40px;text-align:center;color:#aaa;font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-size:20px">🍳</span>
  <span class="logo">Cloud Kitchen — Admin</span>
  <div class="live-badge"><div class="live-dot"></div> Live</div>
</div>

<div class="layout">
  <div class="left">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total today</div><div class="stat-val b" id="s-total">0</div></div>
      <div class="stat"><div class="stat-label">New orders</div><div class="stat-val r" id="s-new">0</div></div>
      <div class="stat"><div class="stat-label">In zone (25km)</div><div class="stat-val g" id="s-inzone">0</div></div>
      <div class="stat"><div class="stat-label">Revenue today</div><div class="stat-val" id="s-rev">₹0</div></div>
    </div>
    <div class="orders-card">
      <div class="card-head">
        <span>Live Orders</span>
        <div class="filters">
          <button class="filter-btn active" id="fb-all">All</button>
          <button class="filter-btn" id="fb-new">New</button>
          <button class="filter-btn" id="fb-confirmed">Confirmed</button>
          <button class="filter-btn" id="fb-out">On the way</button>
          <button class="filter-btn" id="fb-delivered">Delivered</button>
        </div>
      </div>
      <div id="order-list"><div class="empty-orders">Loading orders...</div></div>
    </div>
  </div>
  <div class="right" id="detail-panel">
    <div class="detail-empty">
      <div style="font-size:40px;margin-bottom:12px">📋</div>
      Click an order to see details and rider QR code
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://cwhtmomweslynqyjildp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3aHRtb213ZXNseW5xeWppbGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjA1MTgsImV4cCI6MjA5NzY5NjUxOH0.W6WtVBsNspCjZUIcj55t7DoxhtxVljftT4oZqjXmiu8';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const HUB = { lat: 19.0760, lng: 72.8777 };
const ZONE_KM = 25;
let allOrders = [];
let selectedId = null;
let currentFilter = 'all';

// Attach filter button listeners after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('fb-all').addEventListener('click', function(){ setFilter('all', this); });
  document.getElementById('fb-new').addEventListener('click', function(){ setFilter('new', this); });
  document.getElementById('fb-confirmed').addEventListener('click', function(){ setFilter('confirmed', this); });
  document.getElementById('fb-out').addEventListener('click', function(){ setFilter('out_for_delivery', this); });
  document.getElementById('fb-delivered').addEventListener('click', function(){ setFilter('delivered', this); });
  loadOrders();
  setupRealtime();
});

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderList();
}

function haversine(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function pillClass(s){ return {new:'p-new',confirmed:'p-confirmed',out_for_delivery:'p-out',delivered:'p-delivered',cancelled:'p-cancelled'}[s]||'p-new'; }
function pillLabel(s){ return {new:'New',confirmed:'Confirmed',out_for_delivery:'Out for delivery',delivered:'Delivered',cancelled:'Cancelled'}[s]||s; }

async function loadOrders(){
  var today = new Date(); today.setHours(0,0,0,0);
  var res = await sb.from('orders').select('*').gte('created_at', today.toISOString()).order('created_at',{ascending:false});
  if(res.error){ console.error('Load error:', res.error); return; }
  allOrders = res.data || [];
  renderList();
  updateStats();
}

function renderList(){
  var el = document.getElementById('order-list');
  var filtered = currentFilter === 'all' ? allOrders : allOrders.filter(function(o){ return o.status === currentFilter; });
  if(!filtered.length){ el.innerHTML='<div class="empty-orders">No orders found</div>'; return; }
  el.innerHTML = filtered.map(function(o){
    var d = (o.lat && o.lng) ? haversine(HUB.lat,HUB.lng,o.lat,o.lng) : null;
    var inZone = d !== null && d <= ZONE_KM;
    var distHtml = d !== null
      ? '<span class="odist '+(inZone?'ok':'warn')+'">'+d.toFixed(1)+'km'+(inZone?'':' ⚠')+'</span>'
      : '<span class="odist na">No GPS</span>';
    var addr = o.full_address ? o.full_address.split(',').slice(0,2).join(',') : 'No address yet';
    return '<div class="order-row'+(selectedId===o.id?' selected':'')+'" onclick="selectOrder(\''+o.id+'\')">'
      +'<span class="oid">#'+o.order_number+'</span>'
      +'<span class="oname">'+o.customer_name+'</span>'
      +'<span class="oarea">'+addr+'</span>'
      +distHtml
      +'<span class="pill '+pillClass(o.status)+'">'+pillLabel(o.status)+'</span>'
      +'</div>';
  }).join('');
}

function updateStats(){
  document.getElementById('s-total').textContent = allOrders.length;
  document.getElementById('s-new').textContent = allOrders.filter(function(o){ return o.status==='new'; }).length;
  var withLoc = allOrders.filter(function(o){ return o.lat&&o.lng; });
  document.getElementById('s-inzone').textContent = withLoc.filter(function(o){ return haversine(HUB.lat,HUB.lng,o.lat,o.lng)<=ZONE_KM; }).length;
  var rev = allOrders.filter(function(o){ return o.status!=='cancelled'; }).reduce(function(a,b){ return a+(b.total_price||0); },0);
  document.getElementById('s-rev').textContent = '₹'+rev.toLocaleString('en-IN');
}

function selectOrder(id){
  selectedId = id;
  renderList();
  var o = allOrders.find(function(o){ return o.id===id; });
  if(o) renderDetail(o);
}

function renderDetail(o){
  var d = (o.lat&&o.lng) ? haversine(HUB.lat,HUB.lng,o.lat,o.lng) : null;
  var inZone = d !== null && d <= ZONE_KM;
  var mapsUrl = (o.lat&&o.lng) ? 'https://www.google.com/maps?q='+o.lat+','+o.lng+'&label='+encodeURIComponent(o.customer_name+' #'+o.order_number) : null;
  var items = Array.isArray(o.items) ? o.items : [];

  var html = '<div class="detail-title"><span>#'+o.order_number+'</span><span class="pill '+pillClass(o.status)+'">'+pillLabel(o.status)+'</span></div>';

  if(o.lat && o.lng){
    html += '<div class="qr-box"><div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px">Rider QR — scan to navigate</div><canvas id="qr-c"></canvas><div style="font-size:11px;color:#aaa;margin-top:8px">Opens Google Maps with exact pin 📍</div></div>';
    html += '<div class="has-gps">✅ GPS captured · '+(d?d.toFixed(2)+' km from hub':'')+' · '+(inZone?'Within 25km zone':'⚠ Outside zone')+'</div>';
  } else {
    html += '<div class="no-gps">⚠ GPS not shared — using address only</div>';
  }

  html += '<div class="field"><div class="field-key">Customer</div><div class="field-val">'+o.customer_name+(o.customer_phone?' · '+o.customer_phone:'')+'</div></div>';
  html += '<div class="field"><div class="field-key">Delivery address</div><div class="field-val">'+(o.full_address||'Not provided')+'</div></div>';

  if(o.lat && o.lng){
    html += '<div class="field"><div class="field-key">Coordinates</div><div class="field-val mono">'+o.lat+', '+o.lng+(o.accuracy?' (±'+Math.round(o.accuracy)+'m)':'')+'</div></div>';
    html += '<div class="map-mini"><svg width="100%" height="100%" viewBox="0 0 380 120"><circle cx="190" cy="60" r="50" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/><circle cx="190" cy="60" r="4" fill="#1a1a2e"/><text x="197" y="57" font-size="9" fill="#1a1a2e">Hub</text><circle cx="'+(190+Math.max(-75,Math.min(75,(o.lng-HUB.lng)*1100)))+'" cy="'+(60-Math.max(-45,Math.min(45,(o.lat-HUB.lat)*1100)))+'" r="5" fill="'+(inZone?'#1D9E75':'#E24B4A')+'"/><text x="6" y="112" font-size="9" fill="#888">25 km zone</text></svg></div>';
  }

  html += '<div class="field"><div class="field-key">Items</div><div class="field-val">'+items.map(function(i){ return (i.emoji||'')+'  '+i.name+' × '+i.qty+' — ₹'+i.subtotal; }).join('<br>')+'</div></div>';
  html += '<div class="field"><div class="field-key">Total</div><div class="field-val" style="font-weight:800;color:#E8390E;font-size:15px">₹'+(o.total_price||0)+'</div></div>';
  if(o.notes) html += '<div class="field"><div class="field-key">Notes</div><div class="field-val">'+o.notes+'</div></div>';
  html += '<div class="field"><div class="field-key">Ordered at</div><div class="field-val">'+new Date(o.created_at).toLocaleString('en-IN')+'</div></div>';

  html += '<div class="status-grid">'
    +'<button class="sbtn" onclick="doUpdateStatus(\''+o.id+'\',\'confirmed\')">✅ Confirm</button>'
    +'<button class="sbtn primary" onclick="doUpdateStatus(\''+o.id+'\',\'out_for_delivery\')">🛵 Send rider</button>'
    +'<button class="sbtn" onclick="doUpdateStatus(\''+o.id+'\',\'delivered\')">🎉 Delivered</button>'
    +(mapsUrl ? '<button class="sbtn" onclick="window.open(\''+mapsUrl+'\',\'_blank\')">🗺 Open maps</button>' : '<button class="sbtn red" onclick="doUpdateStatus(\''+o.id+'\',\'cancelled\')">❌ Cancel</button>')
    +'</div>';
  if(mapsUrl) html += '<button class="sbtn red" style="width:100%;margin-top:7px" onclick="doUpdateStatus(\''+o.id+'\',\'cancelled\')">❌ Cancel order</button>';

  document.getElementById('detail-panel').innerHTML = html;

  if(o.lat && o.lng && mapsUrl){
    setTimeout(function(){
      var c = document.getElementById('qr-c');
      if(c && typeof QRCode !== 'undefined') QRCode.toCanvas(c, mapsUrl, {width:160,margin:1}, function(){});
    }, 80);
  }
}

async function doUpdateStatus(id, status){
  var res = await sb.from('orders').update({status:status, updated_at: new Date().toISOString()}).eq('id', id);
  if(res.error){ alert('Error: '+res.error.message); return; }
  var i = allOrders.findIndex(function(o){ return o.id===id; });
  if(i!==-1) allOrders[i].status = status;
  renderList();
  updateStats();
  var o = allOrders.find(function(o){ return o.id===id; });
  if(o) renderDetail(o);
  showToast('Order updated → '+pillLabel(status));
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function setupRealtime(){
  sb.channel('orders-realtime')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'orders'}, function(payload){
      allOrders.unshift(payload.new);
      renderList();
      updateStats();
      showToast('🔔 New order #'+payload.new.order_number+' from '+payload.new.customer_name);
    })
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'orders'}, function(payload){
      var i = allOrders.findIndex(function(o){ return o.id===payload.new.id; });
      if(i!==-1) allOrders[i] = payload.new;
      renderList();
      updateStats();
      if(selectedId===payload.new.id) renderDetail(payload.new);
    })
    .subscribe();
}
</script>
</body>
</html>
